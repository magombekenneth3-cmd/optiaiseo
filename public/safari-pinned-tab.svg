<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    OptiAISEO — Safari pinned-tab mask-icon
    Monochrome (black fill/stroke). Safari uses this as a silhouette.
    Mirrors the favicon: upward-trending zigzag arrow + neural-net polygon mesh.
  -->

  <!-- ── Trend line body (zigzag, upward) ─────────────────────────────── -->
  <polyline
    points="52,440 130,265 210,330 300,185 350,230"
    fill="none"
    stroke="black"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- ── Arrow head — outer filled polygon ────────────────────────────── -->
  <!-- Points: tip, right-wing, inner-right, tail-dip, inner-left, left-wing -->
  <polygon
    points="460,52  500,200  415,170  445,295  360,220  390,130"
    fill="black"
  />

  <!-- ── Neural-net mesh inside arrowhead ─────────────────────────────── -->
  <!-- Cross connectors between the six arrowhead polygon vertices -->
  <g fill="none" stroke="black" stroke-width="10" stroke-linecap="round">
    <line x1="460" y1="52"  x2="415" y2="170"/>
    <line x1="460" y1="52"  x2="390" y2="130"/>
    <line x1="500" y1="200" x2="360" y2="220"/>
    <line x1="415" y1="170" x2="445" y2="295"/>
    <line x1="390" y1="130" x2="360" y2="220"/>
    <line x1="415" y1="170" x2="390" y2="130"/>
    <line x1="445" y1="295" x2="360" y2="220"/>
  </g>

  <!-- ── Node dots (network intersections) ────────────────────────────── -->
  <circle cx="52"  cy="440" r="18" fill="black"/>
  <circle cx="130" cy="265" r="18" fill="black"/>
  <circle cx="210" cy="330" r="18" fill="black"/>
  <circle cx="300" cy="185" r="18" fill="black"/>
  <circle cx="350" cy="230" r="16" fill="black"/>
  <circle cx="460" cy="52"  r="18" fill="black"/>
  <circle cx="500" cy="200" r="16" fill="black"/>
  <circle cx="415" cy="170" r="16" fill="black"/>
  <circle cx="445" cy="295" r="16" fill="black"/>
  <circle cx="390" cy="130" r="16" fill="black"/>
  <circle cx="360" cy="220" r="16" fill="black"/>
</svg>
